services:
  render:
    build: .
    ports:
      - "800${RENDER_INSTANCE:-1}:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=8001
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - API_KEY=${API_KEY}
      - MAX_CONCURRENT_RENDERS=${MAX_CONCURRENT_RENDERS:-10}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-200}
      - REDIS_URL=${REDIS_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-}
      - CALLBACK_HMAC_SECRET=${CALLBACK_HMAC_SECRET}
      - REMOTION_LAMBDA_FUNCTION_NAME=${REMOTION_LAMBDA_FUNCTION_NAME}
      - REMOTION_LAMBDA_SERVE_URL=${REMOTION_LAMBDA_SERVE_URL}
      - REMOTION_LAMBDA_REGION=${REMOTION_LAMBDA_REGION:-ap-south-1}
      - REMOTION_LAMBDA_FRAMES_PER_LAMBDA=${REMOTION_LAMBDA_FRAMES_PER_LAMBDA:-50}
    restart: unless-stopped
