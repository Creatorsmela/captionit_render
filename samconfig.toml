# AWS SAM deployment configuration for captionit_render_serverless
# Run:  sam build && sam deploy
# First time: sam build && sam deploy --guided  (creates this file)

version = 0.1

[default]
[default.global.parameters]
stack_name = "captionit-render-serverless"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities           = "CAPABILITY_IAM"
confirm_changeset      = true
resolve_s3             = true
region                 = "ap-south-1"
# s3_bucket is auto-created by SAM on first --guided deploy
# parameter_overrides below — fill in your values before deploying

# SECRETS — do NOT commit real values here.
# Set these via environment variables before deploying:
#   export CAPTIONIT_API_KEY=<your-api-key>
#   export CAPTIONIT_HMAC_SECRET=<your-hmac-secret>
# Then reference them below with ${CAPTIONIT_API_KEY} syntax,
# or pass them at deploy time: sam deploy --parameter-overrides ApiKey=xxx CallbackHmacSecret=yyy
parameter_overrides = [
  "ApiKey=REPLACE_ME",
  "CallbackHmacSecret=REPLACE_ME",
  "AwsS3Bucket=cpitcm",
  "RemotionLambdaRegion=ap-south-1",
  "RemotionLambdaServeUrl=https://remotionlambda-apsouth1-ysxu1xtptu.s3.ap-south-1.amazonaws.com/sites/captionit-render/index.html",
  "RemotionLambdaFunction1080P=remotion-render-4-0-443-mem3008mb-disk2048mb-900sec",
  "RemotionLambdaFunction4K=remotion-render-4-0-443-mem10000mb-disk10240mb-900sec",
]
